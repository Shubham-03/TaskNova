<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskNova - Productivity & Task Management</title>
    <meta name="description"
        content="TaskNova - A modern task management app with drag-and-drop, focus mode, and gamification.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- SortableJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="page-bg dark:bg-darkBg text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-nav-overlay"></div>

    <!-- ======== SIDEBAR ======== -->
    <div id="app-root" class="flex h-screen overflow-hidden">

        <aside id="sidebar" class="flex flex-col shadow-lg">
            <!-- Logo -->
            <div class="p-5 flex items-center gap-3 border-b border-slate-100 dark:border-slate-800">
                <div
                    class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-extrabold text-sm shadow-lg shadow-primary/30 flex-shrink-0">
                    TN
                </div>
                <h1
                    class="text-lg font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary tracking-tight">
                    TaskNova</h1>
            </div>

            <!-- Nav -->
            <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
                <a href="#" class="nav-item is-active" data-view="board" id="nav-board">
                    <i class="fa-solid fa-table-columns w-4 text-center"></i>
                    <span>Board</span>
                </a>
                <a href="#" class="nav-item" data-view="dashboard" id="nav-dashboard">
                    <i class="fa-solid fa-chart-pie w-4 text-center"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="focus" id="nav-focus">
                    <i class="fa-solid fa-stopwatch w-4 text-center"></i>
                    <span>Focus Mode</span>
                </a>
            </nav>

            <!-- Gamification Widget -->
            <div class="sidebar-gami-bg mx-3 mb-4 p-4 rounded-xl cursor-pointer"
                title="Earn points by completing tasks!">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest">Level
                        <span id="user-level" class="text-primary">1</span></span>
                    <span class="text-xs font-semibold text-slate-500 dark:text-slate-400"><i
                            class="fa-solid fa-fire text-orange-500 mr-1"></i><span id="user-streak">0</span>d</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 mb-1.5 overflow-hidden">
                    <div id="level-progress"
                        class="bg-gradient-to-r from-primary to-secondary h-1.5 rounded-full transition-all duration-500"
                        style="width: 0%"></div>
                </div>
                <p
                    class="text-[10px] text-right text-slate-400 dark:text-slate-500 font-semibold uppercase tracking-widest">
                    <span id="user-points">0</span> / 100 pt</p>
            </div>
        </aside>

        <!-- ======== MAIN CONTENT ======== -->
        <div id="main-content">

            <!-- Header -->
            <header id="main-header">
                <!-- Left: Hamburger + Search -->
                <button id="hamburger-btn"
                    class="md:hidden w-9 h-9 rounded-lg text-slate-500 hover:text-primary hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <div class="search-input-wrap">
                    <i
                        class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                    <input type="text" id="search-input" placeholder="Search tasks…"
                        class="pl-9 pr-3 py-2 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:bg-white dark:focus:bg-slate-900 transition-all text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400">
                </div>

                <!-- Right: Workspace + Theme + New Task -->
                <div class="ml-auto flex items-center gap-2 sm:gap-3">
                    <select id="workspace-select"
                        class="hidden sm:block bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 cursor-pointer text-slate-700 dark:text-slate-200 font-semibold transition-colors">
                        <option value="personal">🏠 Personal</option>
                        <option value="work">💼 Work</option>
                    </select>

                    <button id="theme-toggle"
                        class="w-9 h-9 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors flex-shrink-0">
                        <i id="theme-icon" class="fa-solid fa-moon text-slate-600"></i>
                    </button>

                    <button id="new-task-btn"
                        class="bg-gradient-to-r from-primary to-secondary text-white px-3 sm:px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-primary/30 hover:opacity-90 transition-all flex items-center gap-2 flex-shrink-0">
                        <i class="fa-solid fa-plus"></i>
                        <span class="hidden sm:inline">New Task</span>
                    </button>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="content-area" class="custom-scrollbar">

                <!-- ======== BOARD VIEW ======== -->
                <div id="view-board" class="view-section">

                    <!-- Column: To Do -->
                    <div class="kanban-col flex flex-col">
                        <div class="col-header">
                            <div class="flex items-center gap-2">
                                <div class="w-2.5 h-2.5 rounded-full bg-slate-400"></div>
                                <h2 class="font-bold text-slate-700 dark:text-slate-200 text-sm">To Do</h2>
                            </div>
                            <span id="count-todo"
                                class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs px-2.5 py-0.5 rounded-full font-bold">0</span>
                        </div>
                        <div class="task-list custom-scrollbar" id="col-todo" data-status="todo"></div>
                    </div>

                    <!-- Column: In Progress -->
                    <div class="kanban-col flex flex-col">
                        <div class="col-header">
                            <div class="flex items-center gap-2">
                                <div
                                    class="w-2.5 h-2.5 rounded-full bg-primary animate-pulse shadow-sm shadow-primary/50">
                                </div>
                                <h2 class="font-bold text-slate-700 dark:text-slate-200 text-sm">In Progress</h2>
                            </div>
                            <span id="count-inprogress"
                                class="bg-indigo-50 dark:bg-slate-700 text-primary dark:text-slate-300 text-xs px-2.5 py-0.5 rounded-full font-bold">0</span>
                        </div>
                        <div class="task-list custom-scrollbar" id="col-inprogress" data-status="inprogress"></div>
                    </div>

                    <!-- Column: Done -->
                    <div class="kanban-col flex flex-col">
                        <div class="col-header">
                            <div class="flex items-center gap-2">
                                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-sm shadow-emerald-400/50">
                                </div>
                                <h2 class="font-bold text-slate-700 dark:text-slate-200 text-sm">Done</h2>
                            </div>
                            <span id="count-done"
                                class="bg-emerald-50 dark:bg-slate-700 text-emerald-700 dark:text-slate-300 text-xs px-2.5 py-0.5 rounded-full font-bold">0</span>
                        </div>
                        <div class="task-list custom-scrollbar" id="col-done" data-status="done"></div>
                    </div>
                </div>

                <!-- ======== DASHBOARD VIEW ======== -->
                <div id="view-dashboard" class="view-section">
                    <div class="max-w-4xl mx-auto">
                        <h2 class="text-xl sm:text-2xl font-extrabold mb-6 text-slate-800 dark:text-white">Productivity
                            Dashboard</h2>
                        <div class="dash-grid mb-8">
                            <div
                                class="glass-panel p-6 rounded-2xl border border-slate-200 dark:border-white/5 shadow-sm hover:-translate-y-1 transition-transform">
                                <div
                                    class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center mb-4 text-primary text-xl">
                                    <i class="fa-solid fa-check-double"></i>
                                </div>
                                <h3 class="text-4xl font-black text-slate-800 dark:text-white" id="dash-completed">0
                                </h3>
                                <p class="text-sm font-medium text-slate-500 mt-1">Tasks Completed</p>
                            </div>
                            <div
                                class="glass-panel p-6 rounded-2xl border border-slate-200 dark:border-white/5 shadow-sm hover:-translate-y-1 transition-transform">
                                <div
                                    class="w-12 h-12 bg-orange-500/10 rounded-xl flex items-center justify-center mb-4 text-orange-500 text-xl">
                                    <i class="fa-solid fa-fire"></i>
                                </div>
                                <h3 class="text-4xl font-black text-slate-800 dark:text-white" id="dash-streak-big">0
                                </h3>
                                <p class="text-sm font-medium text-slate-500 mt-1">Day Streak</p>
                            </div>
                            <div
                                class="glass-panel p-6 rounded-2xl border border-slate-200 dark:border-white/5 shadow-sm hover:-translate-y-1 transition-transform">
                                <div
                                    class="w-12 h-12 bg-secondary/10 rounded-xl flex items-center justify-center mb-4 text-secondary text-xl">
                                    <i class="fa-solid fa-star"></i>
                                </div>
                                <h3 class="text-4xl font-black text-slate-800 dark:text-white" id="dash-points-big">0
                                </h3>
                                <p class="text-sm font-medium text-slate-500 mt-1">Total Points</p>
                            </div>
                        </div>
                        <!-- Mobile workspace selector -->
                        <div
                            class="sm:hidden glass-panel p-4 rounded-2xl border border-slate-200 dark:border-white/5 shadow-sm">
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Workspace</label>
                            <select id="workspace-select-mobile"
                                class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 cursor-pointer text-slate-700 dark:text-slate-200 font-semibold">
                                <option value="personal">🏠 Personal</option>
                                <option value="work">💼 Work</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- ======== FOCUS MODE VIEW ======== -->
                <div id="view-focus" class="view-section">
                    <div class="focus-wrapper">
                        <div
                            class="focus-card glass-panel rounded-3xl text-center border border-slate-200 dark:border-white/5 shadow-xl">
                            <div class="text-xs font-extrabold text-primary mb-2 uppercase tracking-[0.2em]">Deep Focus
                            </div>
                            <div id="focus-task-title"
                                class="text-lg sm:text-xl font-semibold mb-8 text-slate-700 dark:text-slate-200 min-h-[28px] leading-snug">
                                Select a task to focus on.</div>

                            <div class="focus-circle-size relative mx-auto mb-8 flex items-center justify-center">
                                <svg class="w-full h-full transform -rotate-90 absolute inset-0">
                                    <circle cx="50%" cy="50%" r="46%" stroke="currentColor" stroke-width="5%"
                                        fill="transparent" class="text-slate-200 dark:text-slate-700" />
                                    <circle id="focus-circle" cx="50%" cy="50%" r="46%" stroke="currentColor"
                                        stroke-width="6%" fill="transparent" stroke-dasharray="289"
                                        stroke-dashoffset="0" stroke-linecap="round"
                                        class="text-primary transition-all duration-1000 ease-linear shadow-glow" />
                                </svg>
                                <span id="focus-time"
                                    class="relative z-10 text-4xl sm:text-5xl font-black font-mono text-slate-800 dark:text-white tracking-widest">25:00</span>
                            </div>

                            <div class="flex justify-center gap-5">
                                <button id="focus-start-btn"
                                    class="bg-gradient-to-r from-primary to-secondary text-white w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center text-xl sm:text-2xl shadow-xl shadow-primary/30 hover:opacity-90 transition-all active:scale-95">
                                    <i class="fa-solid fa-play ml-1"></i>
                                </button>
                                <button id="focus-reset-btn"
                                    class="bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center text-lg sm:text-xl transition-all hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-95">
                                    <i class="fa-solid fa-rotate-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- end content-area -->
        </div><!-- end main-content -->
    </div><!-- end app-root -->

    <!-- ======== BOTTOM NAV (Mobile) ======== -->
    <nav id="bottom-nav">
        <button class="bottom-nav-item is-active" data-view="board">
            <i class="fa-solid fa-table-columns"></i>
            <span>Board</span>
        </button>
        <button class="bottom-nav-item" data-view="dashboard">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Stats</span>
        </button>
        <button class="bottom-nav-item" data-view="focus">
            <i class="fa-solid fa-stopwatch"></i>
            <span>Focus</span>
        </button>
        <button class="bottom-nav-item" id="mobile-new-task-btn">
            <i class="fa-solid fa-plus-circle text-primary"></i>
            <span class="text-primary">Add</span>
        </button>
    </nav>

    <!-- ======== TASK MODAL ======== -->
    <div id="task-modal">
        <div class="modal-panel">
            <!-- Drag handle (mobile) -->
            <div class="w-10 h-1 bg-slate-300 dark:bg-slate-600 rounded-full mx-auto mb-5 sm:hidden"></div>

            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-extrabold text-slate-800 dark:text-white" id="modal-title">New Task</h3>
                <button id="close-modal-btn"
                    class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>

            <form id="task-form" class="space-y-4">
                <input type="hidden" id="task-id">

                <div>
                    <label
                        class="block text-xs font-bold mb-1.5 text-slate-600 dark:text-slate-400 uppercase tracking-wider">Task
                        Title <span
                            class="text-red-500 normal-case lowercase tracking-normal font-normal">*required</span></label>
                    <input type="text" id="task-title-input" required placeholder="What needs to be done?"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-slate-800 dark:text-white font-semibold placeholder-slate-400 text-sm">
                </div>

                <div>
                    <label
                        class="block text-xs font-bold mb-1.5 text-slate-600 dark:text-slate-400 uppercase tracking-wider">Description</label>
                    <textarea id="task-desc-input" rows="2" placeholder="Add more details…"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all resize-none text-slate-800 dark:text-white placeholder-slate-400 text-sm"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-xs font-bold mb-1.5 text-slate-600 dark:text-slate-400 uppercase tracking-wider">Priority</label>
                        <select id="task-priority-input"
                            class="w-full px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all text-slate-800 dark:text-white text-sm cursor-pointer font-semibold">
                            <option value="low">🟡 Low</option>
                            <option value="medium" selected>🟠 Medium</option>
                            <option value="high">🔴 High</option>
                        </select>
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold mb-1.5 text-slate-600 dark:text-slate-400 uppercase tracking-wider">Deadline</label>
                        <input type="date" id="task-date-input"
                            class="w-full px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all text-slate-700 dark:text-slate-300 text-sm cursor-pointer">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-bold mb-1.5 text-slate-600 dark:text-slate-400 uppercase tracking-wider">Tags
                        <span
                            class="normal-case font-normal tracking-normal text-slate-400">(comma-separated)</span></label>
                    <input type="text" id="task-tags-input" placeholder="e.g. Work, Urgent, Study"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all text-slate-800 dark:text-white text-sm placeholder-slate-400">
                </div>

                <div class="flex justify-end gap-3 pt-2 border-t border-slate-100 dark:border-slate-800">
                    <button type="button" id="cancel-modal-btn"
                        class="px-5 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-semibold text-sm">Cancel</button>
                    <button type="submit"
                        class="bg-gradient-to-r from-primary to-secondary text-white px-6 py-2.5 rounded-xl shadow-lg shadow-primary/30 hover:opacity-90 transition-all font-bold text-sm">Save
                        Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
